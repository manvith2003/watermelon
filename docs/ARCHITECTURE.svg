<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="620" fill="#0d1117" rx="12"/>
  <text x="450" y="36" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="700">Autonomous GitHub Platform Intelligence Agent — Architecture</text>
  <text x="18" y="88" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="1">USER</text>
  <text x="18" y="188" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="1">AGENT CORE</text>
  <text x="18" y="338" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="1">MEMORY</text>
  <text x="18" y="468" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="1">TOOLS</text>
  <text x="18" y="568" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="1">EXTERNAL</text>
  <line x1="90" y1="110" x2="880" y2="110" stroke="#21262d" stroke-width="1"/>
  <line x1="90" y1="270" x2="880" y2="270" stroke="#21262d" stroke-width="1"/>
