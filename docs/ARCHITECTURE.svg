<svg viewBox="0 0 780 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="780" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">GitHub Agent — Architecture</text>

  <!-- ── USER ── -->
  <rect x="290" y="44" width="200" height="38" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="390" y="58" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">User</text>
  <text x="390" y="74" text-anchor="middle" font-size="10" fill="#374151">Plain English instruction</text>

  <!-- arrow -->
  <line x1="390" y1="82" x2="390" y2="102" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── ORCHESTRATOR ── -->
  <rect x="265" y="104" width="250" height="38" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="390" y="119" text-anchor="middle" font-size="11" font-weight="bold" fill="#713f12">Orchestrator  (agent/core.py)</text>
  <text x="390" y="134" text-anchor="middle" font-size="10" fill="#374151">Ties everything together — single entry point</text>

  <!-- arrow -->
  <line x1="390" y1="142" x2="390" y2="162" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── PLANNER ── -->
  <rect x="265" y="164" width="250" height="38" rx="8" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="390" y="179" text-anchor="middle" font-size="11" font-weight="bold" fill="#713f12">Planner  (agent/planner.py)</text>
  <text x="390" y="195" text-anchor="middle" font-size="10" fill="#374151">LLM → JSON step plan (uses memory context)</text>

  <!-- arrow -->
  <line x1="390" y1="202" x2="390" y2="222" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── EXECUTOR ── -->
  <rect x="265" y="224" width="250" height="38" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="390" y="239" text-anchor="middle" font-size="11" font-weight="bold" fill="#064e3b">Executor  (agent/executor.py)</text>
  <text x="390" y="255" text-anchor="middle" font-size="10" fill="#374151">Runs steps in order, handles failures</text>

  <!-- arrow down to tools -->
  <line x1="340" y1="262" x2="295" y2="322" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- arrow down to synthesizer -->
  <line x1="440" y1="262" x2="485" y2="322" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ap)"/>
  <text x="456" y="300" font-size="9" fill="#7c3aed">if tool</text>
  <text x="452" y="311" font-size="9" fill="#7c3aed">missing</text>

  <!-- ── GITHUB TOOLS ── -->
  <rect x="160" y="324" width="190" height="38" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="255" y="339" text-anchor="middle" font-size="11" font-weight="bold" fill="#7f1d1d">GitHub Tools</text>
  <text x="255" y="355" text-anchor="middle" font-size="10" fill="#374151">18 built-in API functions</text>

  <!-- ── SYNTHESIZER ── -->
  <rect x="430" y="324" width="190" height="38" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="525" y="339" text-anchor="middle" font-size="11" font-weight="bold" fill="#4c1d95">Synthesizer</text>
  <text x="525" y="355" text-anchor="middle" font-size="10" fill="#374151">LLM writes Python → exec() → register</text>

  <!-- arrows to external -->
  <line x1="255" y1="362" x2="235" y2="442" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="525" y1="362" x2="545" y2="442" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ap)"/>

  <!-- ── GITHUB API ── -->
  <rect x="130" y="444" width="190" height="38" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="225" y="459" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">GitHub REST API</text>
  <text x="225" y="475" text-anchor="middle" font-size="10" fill="#555">api.github.com</text>

  <!-- ── GROQ LLM ── -->
  <rect x="460" y="444" width="190" height="38" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="555" y="459" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">Groq LLM</text>
  <text x="555" y="475" text-anchor="middle" font-size="10" fill="#555">llama-3.3-70b (free tier)</text>

  <!-- ══ MEMORY PANEL (left side) ══ -->
  <rect x="8" y="104" width="175" height="280" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="95" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">Memory Layer</text>
  <text x="95" y="136" text-anchor="middle" font-size="9" fill="#555">(memory/db.py — SQLite)</text>

  <!-- Layer 1 -->
  <rect x="18" y="144" width="155" height="80" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="95" y="159" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532d">Layer 1: Execution Memory</text>
  <text x="95" y="173" text-anchor="middle" font-size="9" fill="#374151">executions table</text>
  <text x="95" y="186" text-anchor="middle" font-size="9" fill="#374151">step_patterns table</text>
  <text x="95" y="199" text-anchor="middle" font-size="9" fill="#374151">Stores past runs + optimal</text>
  <text x="95" y="211" text-anchor="middle" font-size="9" fill="#374151">step sequences</text>

  <!-- Layer 2 -->
  <rect x="18" y="234" width="155" height="80" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="95" y="249" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532d">Layer 2: Capability Memory</text>
  <text x="95" y="263" text-anchor="middle" font-size="9" fill="#374151">capabilities table</text>
  <text x="95" y="276" text-anchor="middle" font-size="9" fill="#374151">runtime_constraints table</text>
  <text x="95" y="289" text-anchor="middle" font-size="9" fill="#374151">Stores tools + success</text>
  <text x="95" y="301" text-anchor="middle" font-size="9" fill="#374151">rates + constraints</text>

  <!-- Self-learning loop label -->
  <rect x="18" y="324" width="155" height="48" rx="6" fill="#86efac" stroke="#16a34a" stroke-width="1"/>
  <text x="95" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532d">Self-Learning Loop</text>
  <text x="95" y="354" text-anchor="middle" font-size="9" fill="#14532d">API calls decrease over time</text>
  <text x="95" y="366" text-anchor="middle" font-size="9" fill="#14532d">as memory improves plans</text>

  <!-- Memory ↔ Planner arrows -->
  <line x1="183" y1="175" x2="264" y2="175" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ag)"/>
  <text x="210" y="170" font-size="8" fill="#16a34a">reads</text>

  <!-- Memory ↔ Executor arrows -->
  <line x1="264" y1="245" x2="183" y2="265" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ag)"/>
  <text x="196" y="260" font-size="8" fill="#16a34a">writes</text>

  <!-- ── LEGEND ── -->
  <rect x="8" y="500" width="764" height="108" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="390" y="518" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">Legend</text>

  <line x1="30" y1="535" x2="70" y2="535" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="76" y="539" font-size="9" fill="#374151">Normal execution flow</text>

  <line x1="180" y1="535" x2="220" y2="535" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ap)"/>
  <text x="226" y="539" font-size="9" fill="#7c3aed">Synthesis path (only when tool missing)</text>

  <line x1="410" y1="535" x2="450" y2="535" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ag)"/>
  <text x="456" y="539" font-size="9" fill="#16a34a">Memory read / write</text>

  <text x="30" y="562" font-size="9" fill="#374151">• Orchestrator → receives instruction, calls Planner → Executor → saves result to memory</text>
  <text x="30" y="578" font-size="9" fill="#374151">• Planner → gets memory context (past runs, optimal steps) before every plan — this is what drives learning</text>
  <text x="30" y="594" font-size="9" fill="#374151">• Synthesizer → only triggered when Executor finds a tool not in registry; generated code is saved permanently</text>

  <defs>
    <marker id="a"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#555"/></marker>
    <marker id="ap" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#16a34a"/></marker>
  </defs>
</svg>