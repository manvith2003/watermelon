  <line x1="90" y1="530" x2="880" y2="530" stroke="#21262d" stroke-width="1"/>
  <rect x="300" y="58" width="300" height="44" rx="8" fill="#1f6feb" opacity="0.15" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="450" y="75" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="600">Natural Language Instruction</text>
  <text x="450" y="93" text-anchor="middle" fill="#8b949e" font-size="10">"create a bug report for the login timeout issue"</text>
  <rect x="100" y="125" width="155" height="56" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="178" y="147" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Orchestrator</text>
  <text x="178" y="163" text-anchor="middle" fill="#8b949e" font-size="10">agent/core.py</text>
  <text x="178" y="175" text-anchor="middle" fill="#8b949e" font-size="10">ties all layers together</text>
  <rect x="285" y="125" width="155" height="56" rx="8" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>
  <text x="363" y="147" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="600">Planner</text>
  <text x="363" y="163" text-anchor="middle" fill="#8b949e" font-size="10">agent/planner.py</text>
  <text x="363" y="175" text-anchor="middle" fill="#8b949e" font-size="10">LLM → JSON step plan</text>
  <rect x="470" y="125" width="155" height="56" rx="8" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>
  <text x="548" y="147" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="600">Executor</text>
  <text x="548" y="163" text-anchor="middle" fill="#8b949e" font-size="10">agent/executor.py</text>
  <text x="548" y="175" text-anchor="middle" fill="#8b949e" font-size="10">runs steps + handles failures</text>
  <rect x="655" y="125" width="155" height="56" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="733" y="147" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="600">Synthesizer</text>
  <text x="733" y="163" text-anchor="middle" fill="#8b949e" font-size="10">synthesis/synthesizer.py</text>
  <text x="733" y="175" text-anchor="middle" fill="#8b949e" font-size="10">generates tools at runtime</text>
  <rect x="100" y="285" width="155" height="56" rx="8" fill="#161b22" stroke="#8957e5" stroke-width="1.5"/>
  <text x="178" y="307" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="600">Memory Manager</text>
  <text x="178" y="323" text-anchor="middle" fill="#8b949e" font-size="10">memory/memory_manager.py</text>
  <text x="178" y="335" text-anchor="middle" fill="#8b949e" font-size="10">formats context for planner</text>
  <rect x="285" y="285" width="155" height="56" rx="8" fill="#161b22" stroke="#8957e5" stroke-width="1.5"/>
  <text x="363" y="307" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="600">Execution Memory</text>
  <text x="363" y="323" text-anchor="middle" fill="#8b949e" font-size="10">past runs · step patterns</text>
  <text x="363" y="335" text-anchor="middle" fill="#8b949e" font-size="10">timing · learnings</text>
  <rect x="470" y="285" width="155" height="56" rx="8" fill="#161b22" stroke="#8957e5" stroke-width="1.5"/>
  <text x="548" y="307" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="600">Capability Memory</text>
  <text x="548" y="323" text-anchor="middle" fill="#8b949e" font-size="10">tools · success rates</text>
  <text x="548" y="335" text-anchor="middle" fill="#8b949e" font-size="10">runtime constraints</text>
  <rect x="655" y="285" width="155" height="56" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="733" y="307" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="600">Learning Loop</text>
  <text x="733" y="323" text-anchor="middle" fill="#8b949e" font-size="10">learning/feedback.py</text>
  <text x="733" y="335" text-anchor="middle" fill="#8b949e" font-size="10">API call improvement signal</text>
  <rect x="285" y="350" width="340" height="22" rx="4" fill="#21262d"/>
  <text x="455" y="365" text-anchor="middle" fill="#8b949e" font-size="10">SQLite — 4 tables: executions · step_patterns · capabilities · runtime_constraints</text>
  <rect x="100" y="435" width="155" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="178" y="455" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Tool Registry</text>
  <text x="178" y="471" text-anchor="middle" fill="#8b949e" font-size="10">tools/registry.py</text>
  <text x="178" y="483" text-anchor="middle" fill="#8b949e" font-size="9">lookup · register · call</text>
  <rect x="285" y="435" width="340" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="455" y="455" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">18 Base GitHub Tools</text>
  <text x="455" y="471" text-anchor="middle" fill="#8b949e" font-size="10">tools/github_tools.py</text>
  <text x="455" y="483" text-anchor="middle" fill="#8b949e" font-size="9">issues · PRs · labels · milestones · releases · users</text>
  <rect x="655" y="435" width="155" height="50" rx="8" fill="#2d1b00" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="733" y="455" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="600">Synthesized Tools</text>
  <text x="733" y="471" text-anchor="middle" fill="#8b949e" font-size="10">generated at runtime</text>
  <text x="733" y="483" text-anchor="middle" fill="#8b949e" font-size="9">e.g. get_issue_age_report</text>
  <rect x="250" y="545" width="160" height="44" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="330" y="563" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">GitHub REST API</text>
  <text x="330" y="579" text-anchor="middle" fill="#8b949e" font-size="10">api.github.com</text>
  <rect x="490" y="545" width="160" height="44" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="570" y="563" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">LLM — Groq</text>
  <text x="570" y="579" text-anchor="middle" fill="#8b949e" font-size="10">llama-3.3-70b (free tier)</text>
  <defs>
