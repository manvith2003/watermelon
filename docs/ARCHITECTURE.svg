<svg viewBox="0 0 720 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="720" height="500" fill="#ffffff"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">GitHub Agent — How It Works</text>

  <!-- User box -->
  <rect x="270" y="50" width="180" height="40" rx="6" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="360" y="75" text-anchor="middle" font-size="12" fill="#333">You (plain English instruction)</text>

  <!-- Arrow down -->
  <line x1="360" y1="90" x2="360" y2="118" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Planner box -->
  <rect x="230" y="120" width="260" height="44" rx="6" fill="#fff3cd" stroke="#e0a800" stroke-width="1.5"/>
  <text x="360" y="138" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Planner  (agent/planner.py)</text>
  <text x="360" y="156" text-anchor="middle" font-size="10" fill="#666">LLM breaks instruction into steps</text>

  <!-- Arrow down -->
  <line x1="360" y1="164" x2="360" y2="192" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Executor box -->
  <rect x="230" y="194" width="260" height="44" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="360" y="212" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Executor  (agent/executor.py)</text>
  <text x="360" y="230" text-anchor="middle" font-size="10" fill="#666">Runs each step, handles failures</text>

  <!-- Arrow down to tools -->
  <line x1="360" y1="238" x2="360" y2="266" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GitHub Tools box -->
  <rect x="200" y="268" width="160" height="44" rx="6" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="280" y="286" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">GitHub Tools</text>
  <text x="280" y="302" text-anchor="middle" font-size="10" fill="#666">18 built-in API functions</text>

  <!-- Synthesizer box -->
  <rect x="380" y="268" width="160" height="44" rx="6" fill="#e2d9f3" stroke="#6f42c1" stroke-width="1.5"/>
  <text x="460" y="286" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Synthesizer</text>
  <text x="460" y="302" text-anchor="middle" font-size="10" fill="#666">Generates new tools via LLM</text>

  <!-- Arrow from executor to synthesizer -->
  <line x1="450" y1="238" x2="450" y2="266" stroke="#6f42c1" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-p)"/>

  <!-- Arrow from GitHub Tools to GitHub API -->
  <line x1="280" y1="312" x2="280" y2="360" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GitHub API box -->
  <rect x="170" y="362" width="190" height="40" rx="6" fill="#f0f0f0" stroke="#888" stroke-width="1.5"/>
  <text x="265" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">GitHub REST API</text>
  <text x="265" y="394" text-anchor="middle" font-size="10" fill="#666">api.github.com</text>

  <!-- Groq LLM box -->
  <rect x="390" y="362" width="190" height="40" rx="6" fill="#f0f0f0" stroke="#888" stroke-width="1.5"/>
  <text x="485" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Groq LLM</text>
  <text x="485" y="394" text-anchor="middle" font-size="10" fill="#666">llama-3.3-70b (free tier)</text>

  <!-- Arrow from synthesizer to Groq -->
  <line x1="460" y1="312" x2="480" y2="360" stroke="#6f42c1" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-p)"/>

  <!-- Memory box on left -->
  <rect x="30" y="170" width="160" height="120" rx="6" fill="#e8f8f5" stroke="#1abc9c" stroke-width="1.5"/>
  <text x="110" y="192" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Memory (SQLite)</text>
  <text x="110" y="210" text-anchor="middle" font-size="9" fill="#555">executions</text>
  <text x="110" y="225" text-anchor="middle" font-size="9" fill="#555">step_patterns</text>
  <text x="110" y="240" text-anchor="middle" font-size="9" fill="#555">capabilities</text>
  <text x="110" y="255" text-anchor="middle" font-size="9" fill="#555">runtime_constraints</text>
  <text x="110" y="275" text-anchor="middle" font-size="9" fill="#888">memory/db.py</text>

  <!-- Arrow: Planner reads memory -->
  <line x1="190" y1="210" x2="230" y2="175" stroke="#1abc9c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-g)"/>
  <text x="195" y="190" font-size="8" fill="#1abc9c">reads</text>

  <!-- Arrow: Executor writes memory -->
  <line x1="230" y1="220" x2="190" y2="230" stroke="#1abc9c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-g)"/>
  <text x="193" y="245" font-size="8" fill="#1abc9c">writes</text>

  <!-- Learning label -->
  <text x="110" y="310" text-anchor="middle" font-size="9" fill="#1abc9c" font-style="italic">Self-learning loop:</text>
  <text x="110" y="322" text-anchor="middle" font-size="9" fill="#1abc9c" font-style="italic">fewer API calls over time</text>

  <!-- Legend -->
  <rect x="30" y="430" width="660" height="50" rx="4" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="455" x2="80" y2="455" stroke="#555" stroke-width="1.5"/>
  <text x="85" y="459" font-size="9" fill="#555">normal flow</text>
  <line x1="145" y1="455" x2="175" y2="455" stroke="#6f42c1" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="180" y="459" font-size="9" fill="#6f42c1">synthesis path</text>
  <line x1="260" y1="455" x2="290" y2="455" stroke="#1abc9c" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="295" y="459" font-size="9" fill="#1abc9c">memory read/write</text>
  <text x="420" y="459" font-size="9" fill="#666">Planner uses memory before every run → learns optimal step order</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-p" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6f42c1"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1abc9c"/>
    </marker>
  </defs>
</svg>